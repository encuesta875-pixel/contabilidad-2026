<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos - CONTA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar bg-primary text-white p-3">
            <div class="mb-4">
                <div class="logo-circle-small mb-2">
                    <span class="logo-text-small">C</span>
                </div>
                <h4 class="mb-0">CONTA</h4>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link text-white" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a class="nav-link text-white" th:href="@{/chat}"><i class="bi bi-chat-dots me-2"></i> Chat IA</a>
                <a class="nav-link text-white" th:href="@{/transacciones}"><i class="bi bi-list-ul me-2"></i> Transacciones</a>
                <a class="nav-link active text-white" th:href="@{/documentos}"><i class="bi bi-file-earmark-text me-2"></i> Documentos</a>
                <a class="nav-link text-white" th:href="@{/planes}"><i class="bi bi-star me-2"></i> Planes</a>
            </nav>
            <div class="mt-auto pt-5">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light w-100"><i class="bi bi-box-arrow-right me-2"></i> Salir</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-white border-bottom px-4">
                <span class="navbar-brand mb-0 h1">Mis Documentos</span>
                <div class="d-flex align-items-center">
                    <span class="me-3" th:text="${usuario.nombre}"></span>
                    <div class="user-avatar"><span th:text="${#strings.substring(usuario.nombre, 0, 1)}"></span></div>
                </div>
            </nav>

            <div class="content-area p-4">
                <div class="row mb-4">
                    <div class="col-12">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#subirDocumentoModal">
                            <i class="bi bi-upload me-2"></i> Subir Documento
                        </button>
                    </div>
                </div>

                <div th:if="${param.success}" class="alert alert-success">Documento subido exitosamente</div>
                <div th:if="${param.deleted}" class="alert alert-info">Documento eliminado</div>
                <div th:if="${param.error}" class="alert alert-danger">Error al procesar el documento</div>

                <div class="row g-4">
                    <div class="col-md-3" th:each="doc : ${documentos}">
                        <div class="card shadow-sm border-0 rounded-3">
                            <div class="card-body text-center">
                                <i class="bi bi-file-earmark-pdf text-danger" style="font-size: 3rem;"></i>
                                <h6 class="mt-3 mb-1" th:text="${doc.nombreArchivo}"></h6>
                                <p class="text-muted small mb-2" th:text="${#temporals.format(doc.fechaSubida, 'dd/MM/yyyy')}"></p>
                                <a th:href="@{/documentos/eliminar/{id}(id=${doc.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Eliminar este documento?')">
                                    <i class="bi bi-trash"></i> Eliminar
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="col-12" th:if="${#lists.isEmpty(documentos)}">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-file-earmark" style="font-size: 4rem;"></i>
                            <p class="mt-3">No hay documentos subidos</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Subir Documento -->
    <div class="modal fade" id="subirDocumentoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/documentos/subir}" method="post" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title">Subir Documento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Seleccionar archivo</label>
                            <input type="file" class="form-control" name="file" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Subir</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
