services:
  - type: web
    name: contabilidad-app
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/App-contabilidadapp-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contabilidad-db
          property: connectionString
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m"
      - key: GOOGLE_CLIENT_ID
        value: pendiente
      - key: GOOGLE_CLIENT_SECRET
        value: pendiente
      - key: LICENCIAS_HABILITADO
        value: false

databases:
  - name: contabilidad-db
    databaseName: conta_db
    user: conta_user
