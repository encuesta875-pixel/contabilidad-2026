<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estado de Resultados - Conta Pro')}"></head>
<body>
    <div class="main-container">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <div class="content-wrapper">
            <div class="content-main">
                <div th:replace="~{fragments/layout :: navbar('Estado de Resultados', 'Reportes / Estado de Resultados')}"></div>

                <div class="card" style="text-align: center; padding: 80px 40px;">
                    <div style="width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 50%; background: linear-gradient(135deg, #F5A623 0%, #D0021B 100%); display: flex; align-items: center; justify-content: center;">
                        <svg style="width: 60px; height: 60px; color: white;" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11 4a1 1 0 10-2 0v4a1 1 0 102 0V7zm-3 1a1 1 0 10-2 0v3a1 1 0 102 0V8zM8 9a1 1 0 00-2 0v2a1 1 0 102 0V9z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h2 style="font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px;">
                        Estado de Resultados (P&G)
                    </h2>
                    <p style="font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        Reporte de utilidades o pérdidas. Muestra Ingresos, Gastos y Resultado del periodo.
                    </p>
                    <div style="display: inline-block; padding: 12px 24px; background: rgba(245, 166, 35, 0.1); color: var(--warning); border-radius: var(--border-radius); font-weight: 600;">
                        🚀 Próximamente disponible
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
