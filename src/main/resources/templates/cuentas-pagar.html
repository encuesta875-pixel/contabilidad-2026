<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cuentas por Pagar - Conta Pro')}"></head>
<body>
    <div class="main-container">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <div class="content-wrapper">
            <div class="content-main">
                <div th:replace="~{fragments/layout :: navbar('Cuentas por Pagar', 'Cartera / Por Pagar')}"></div>

                <div class="card" style="text-align: center; padding: 80px 40px;">
                    <div style="width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 50%; background: linear-gradient(135deg, #D0021B 0%, #F5A623 100%); display: flex; align-items: center; justify-content: center;">
                        <svg style="width: 60px; height: 60px; color: white;" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h2 style="font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px;">
                        Cuentas por Pagar
                    </h2>
                    <p style="font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        Registro de deudas con proveedores. Programación de pagos y control de vencimientos.
                    </p>
                    <div style="display: inline-block; padding: 12px 24px; background: rgba(208, 2, 27, 0.1); color: var(--expense); border-radius: var(--border-radius); font-weight: 600;">
                        🚀 Próximamente disponible
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
