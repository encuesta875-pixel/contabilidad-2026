<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - CONTA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar bg-primary text-white p-3">
            <div class="mb-4">
                <div class="logo-circle-small mb-2">
                    <span class="logo-text-small">C</span>
                </div>
                <h4 class="mb-0">CONTA</h4>
            </div>

            <nav class="nav flex-column">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a class="nav-link active text-white" th:href="@{/chat}">
                    <i class="bi bi-chat-dots me-2"></i> Chat IA
                </a>
                <a class="nav-link text-white" th:href="@{/transacciones}">
                    <i class="bi bi-list-ul me-2"></i> Transacciones
                </a>
                <a class="nav-link text-white" th:href="@{/documentos}">
                    <i class="bi bi-file-earmark-text me-2"></i> Documentos
                </a>
                <a class="nav-link text-white" th:href="@{/planes}">
                    <i class="bi bi-star me-2"></i> Planes
                </a>
            </nav>

            <div class="mt-auto pt-5">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light w-100">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <!-- Navbar -->
            <nav class="navbar navbar-light bg-white border-bottom px-4">
                <span class="navbar-brand mb-0 h1">Chat con IA Contable</span>
                <div class="d-flex align-items-center">
                    <span class="me-3" th:text="${usuario.nombre}"></span>
                    <div class="user-avatar">
                        <span th:text="${#strings.substring(usuario.nombre, 0, 1)}"></span>
                    </div>
                </div>
            </nav>

            <!-- Content -->
            <div class="content-area p-4">
                <div class="row h-100">
                    <div class="col-12">
                        <div class="card shadow-sm border-0 rounded-3 chat-container">
                            <div class="card-header bg-gradient-primary text-white">
                                <h5 class="mb-0"><i class="bi bi-robot me-2"></i> Asistente Contable IA</h5>
                                <small>Escribe como hablas, yo entiendo</small>
                            </div>
                            <div class="card-body chat-messages" id="chatMessages">
                                <div class="message bot-message">
                                    <div class="message-avatar bg-primary">
                                        <i class="bi bi-robot text-white"></i>
                                    </div>
                                    <div class="message-content">
                                        <p class="mb-0">¡Hola! Soy tu asistente contable. Puedes decirme cosas como:</p>
                                        <ul class="mt-2 mb-0">
                                            <li>"Vendí 3 panes a $5000"</li>
                                            <li>"Gasté $10000 en comida"</li>
                                            <li>"¿Cuál es mi balance?"</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white">
                                <form id="chatForm" class="input-group">
                                    <input type="text" class="form-control" id="messageInput" placeholder="Escribe tu mensaje..." autocomplete="off">
                                    <button class="btn btn-primary" type="submit">
                                        <i class="bi bi-send-fill"></i> Enviar
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const mensaje = messageInput.value.trim();

            if (!mensaje) return;

            // Agregar mensaje del usuario
            addMessage(mensaje, 'user');
            messageInput.value = '';

            try {
                const response = await fetch('/chat/mensaje', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mensaje: mensaje })
                });

                const data = await response.json();

                // Agregar respuesta del bot
                addMessage(data.respuesta, 'bot');
            } catch (error) {
                addMessage('Error al procesar el mensaje. Intenta de nuevo.', 'bot');
            }
        });

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            if (type === 'bot') {
                messageDiv.innerHTML = `
                    <div class="message-avatar bg-primary">
                        <i class="bi bi-robot text-white"></i>
                    </div>
                    <div class="message-content">
                        <p class="mb-0">${text}</p>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="message-content user">
                        <p class="mb-0">${text}</p>
                    </div>
                `;
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
