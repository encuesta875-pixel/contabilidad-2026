<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Conciliación Bancaria - Conta Pro')}"></head>
<body>
    <div class="main-container">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <div class="content-wrapper">
            <div class="content-main">
                <div th:replace="~{fragments/layout :: navbar('Conciliación Bancaria', 'Tesorería / Conciliación')}"></div>

                <div class="card" style="text-align: center; padding: 80px 40px;">
                    <div style="width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 50%; background: linear-gradient(135deg, #4A90E2 0%, #9013FE 100%); display: flex; align-items: center; justify-content: center;">
                        <svg style="width: 60px; height: 60px; color: white;" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h2 style="font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px;">
                        Conciliación Bancaria
                    </h2>
                    <p style="font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        Cruce de información entre registros contables y extractos bancarios. Identificación de diferencias.
                    </p>
                    <div style="display: inline-block; padding: 12px 24px; background: rgba(144, 19, 254, 0.1); color: var(--info); border-radius: var(--border-radius); font-weight: 600;">
                        🚀 Próximamente disponible
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
