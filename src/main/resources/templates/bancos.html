<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cuentas Bancarias - Conta Pro')}"></head>
<body>
    <div class="main-container">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <div class="content-wrapper">
            <div class="content-main">
                <div th:replace="~{fragments/layout :: navbar('Cuentas Bancarias', 'Tesorería / Bancos')}"></div>

                <div class="card" style="text-align: center; padding: 80px 40px;">
                    <div style="width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 50%; background: linear-gradient(135deg, #1A8926 0%, #50E3C2 100%); display: flex; align-items: center; justify-content: center;">
                        <svg style="width: 60px; height: 60px; color: white;" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/>
                            <path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h2 style="font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px;">
                        Cuentas Bancarias
                    </h2>
                    <p style="font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        Gestión de múltiples cuentas bancarias y cajas menores. Control de saldos y movimientos.
                    </p>
                    <div style="display: inline-block; padding: 12px 24px; background: rgba(26, 137, 38, 0.1); color: var(--success); border-radius: var(--border-radius); font-weight: 600;">
                        🚀 Próximamente disponible
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
